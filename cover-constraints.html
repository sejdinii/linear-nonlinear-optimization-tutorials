let cur=0;

const chapters=[

// ===== 0: WHAT ARE COVER CONSTRAINTS =====
{title:"What are Cover Constraints?",html:`
<div class="chapter-num">Prologue</div>
<h2>What are Cover Constraints?</h2>
<div class="subtitle">The simplest topic in ILP. No tableau, no pivoting, no ratios. Just weights, capacity, and arithmetic.</div>

<div class="card blue">
<div class="card-title">The Idea — A Car Trip</div>
<div class="explain" style="margin:0">
You're packing a car for a road trip. The trunk holds <strong>18 kg</strong>. You have <strong>5 bags</strong> to consider:<br><br>
• Bag 1: 3 kg (clothes)<br>
• Bag 2: 4 kg (food)<br>
• Bag 3: 12 kg (camping gear)<br>
• Bag 4: 8 kg (tools)<br>
• Bag 5: 6 kg (sports equipment)<br><br>
Now — can you fit ALL 5 bags? 3+4+12+8+6 = 33. Way too much. But that's obvious and not very useful.<br><br>
The interesting question is: what's the <strong>smallest group</strong> of bags that's already too heavy? Not all 5 — just a specific few.<br><br>
Look at bags <strong>{1, 2, 4, 5}</strong> (leave out the camping gear for now). They weigh 3+4+8+6 = 21 > 18. <strong>These four alone already don't fit.</strong> That's a cover — a subset of items that's too heavy.<br><br>
Notice: we didn't use all 5 bags. Just 4 of them. A cover is a <strong>specific group you pick</strong> — it could be 3 items, 4 items, or any number. It doesn't have to be all of them. The exercise tells you which group to check.
</div>
</div>

<div class="card blue">
<div class="card-title">Why Only a Subset?</div>
<div class="explain" style="margin:0">
If you said "all 5 bags don't fit" — that's true but not very helpful. Of course all 5 don't fit. That's a cover, but it's not <strong>minimal</strong>.<br><br>
A <strong>minimal cover</strong> is the tightest possible group — the smallest gang of items that's still too heavy. If you kick anyone out, suddenly they fit. Every member is essential to making it overflow.<br><br>
In our example: bags {1, 2, 4, 5} weigh 21 (too heavy). But kick out any one of them:<br>
• Without bag 1: 4+8+6 = 18 → fits!<br>
• Without bag 2: 3+8+6 = 17 → fits!<br>
• Without bag 4: 3+4+6 = 13 → fits!<br>
• Without bag 5: 3+4+8 = 15 → fits!<br><br>
Every single bag matters. That's what makes it <strong>minimal</strong>.<br><br>
A problem might have 6, 7, or 10 variables — but the minimal cover might only be 3 or 4 of them. It's the critical group where the overflow happens.
</div>
</div>

<div class="card blue">
<div class="card-title">So What's the Constraint?</div>
<div class="explain" style="margin:0">
Since these 4 bags can't all fit, at least one must stay home. The constraint is:<br><br>
<strong>x₁ + x₂ + x₄ + x₅ ≤ 3</strong><br><br>
"Out of these 4 bags, you can bring at most 3." That's a cover constraint. Simple as that.
</div>
</div>

<div class="card blue">
<div class="card-title">Where Does This Fit?</div>
<div class="explain" style="margin:0">
Cover constraints are a type of <strong>cutting plane</strong> — just like Gomory cuts. They add a new inequality to tighten the problem.<br><br>
But they're much simpler:<br>
• <strong>Gomory cuts</strong> → need a simplex tableau, fractional parts, dual simplex. For integer problems.<br>
• <strong>Cover constraints</strong> → just arithmetic. For binary (0-1) knapsack problems.<br><br>
No solving. No tableau. Just <strong>prove and write</strong>.
</div>
</div>

<div class="card blue">
<div class="card-title">Key Terms</div>
<div class="explain" style="margin:0">
<strong>Cover</strong> = a group of items (not necessarily all) whose weights exceed capacity. They can't all fit.<br><br>
<strong>Minimal cover</strong> = the smallest such group. Remove any one item and it fits again. Every item is necessary to make it too heavy.<br><br>
<strong>Cover inequality</strong> = the constraint you write: sum of x's in the group ≤ group size − 1.<br><br>
<strong>Strengthening</strong> = adding outside variables to the left side without changing the right side. Makes the constraint tighter.
</div>
</div>

<div class="card blue">
<div class="card-title">What You Do on the Exam</div>
<div class="explain" style="margin:0">
The exercise gives you a group and asks you to:<br><br>
<strong>①</strong> Prove it's a cover (add up weights, check > capacity)<br>
<strong>②</strong> Prove it's minimal (remove each item one at a time, check all ≤ capacity)<br>
<strong>③</strong> Write the inequality<br>
<strong>④</strong> Strengthen it (check if outside items are heavier than all items in the cover)<br><br>
That's the whole exam task. Just arithmetic and counting.
</div>
</div>
`},

// ===== 1: THE PROBLEM =====
{title:"The Problem",html:`
<div class="chapter-num">Step 1</div>
<h2>The Problem</h2>
<div class="subtitle">Here's our binary knapsack problem.</div>

<div class="card blue">
<div class="card-title">Problem</div>
<div class="work-line result">max 18x₁ + 20x₂ + 36x₃ + 20x₄ + 12x₅</div>
<div class="work-line">s.t. 3x₁ + 4x₂ + 12x₃ + 8x₄ + 6x₅ ≤ 18</div>
<div class="work-line">x₁, …, x₅ ∈ {0, 1}</div>
</div>

<div class="card">
<div class="card-title">Item Weights — This Is All We Need</div>
<table class="tab">
<tr><th>Item</th><th>Weight</th></tr>
<tr><td>x₁</td><td>3</td></tr>
<tr><td>x₂</td><td>4</td></tr>
<tr><td>x₃</td><td>12</td></tr>
<tr><td>x₄</td><td>8</td></tr>
<tr><td>x₅</td><td>6</td></tr>
</table>
<div class="explain" style="margin-top:8px"><strong>Capacity = 18.</strong> No profits needed. No ratios. Just weights.</div>
</div>

<div class="card amber">
<div class="card-title">The Task</div>
<div class="explain" style="margin:0">
<strong>Part 1:</strong> Prove that C = {1, 2, 4, 5} is a minimal cover set. Write the inequality.<br>
<strong>Part 2:</strong> Strengthen the inequality.
</div>
</div>

<div class="outcome next">→ Let's start by checking if {1, 2, 4, 5} is a cover.</div>
`},

// ===== 2: IS IT A COVER =====
{title:"Is It a Cover?",html:`
<div class="chapter-num">Step 2 — Part 1a</div>
<h2>Is C = {1, 2, 4, 5} a Cover?</h2>
<div class="subtitle">A cover means: the total weight of the group exceeds capacity. Can all four items fit in the bag at the same time?</div>

<div class="card">
<div class="card-title">The Group</div>
<div class="explain" style="margin:0">Our group is items 1, 2, 4, and 5. Note: <strong>x₃ is NOT in this group</strong> — we're only looking at these four.</div>
<table class="tab">
<tr><th>Item</th><th>Weight</th><th>In group?</th></tr>
<tr class="row-hl"><td>x₁</td><td class="hl">3</td><td class="hl">Yes</td></tr>
<tr class="row-hl"><td>x₂</td><td class="hl">4</td><td class="hl">Yes</td></tr>
<tr><td>x₃</td><td class="dim">12</td><td class="dim">No</td></tr>
<tr class="row-hl"><td>x₄</td><td class="hl">8</td><td class="hl">Yes</td></tr>
<tr class="row-hl"><td>x₅</td><td class="hl">6</td><td class="hl">Yes</td></tr>
</table>
</div>

<div class="card green">
<div class="card-title">Add Up the Weights</div>
<div class="work-line">3 + 4 + 8 + 6</div>
<div class="work-line">= 7 + 8 + 6</div>
<div class="work-line">= 15 + 6</div>
<div class="work-line result">= 21</div>
<div class="work-line" style="margin-top:6px">21 > 18 (capacity)</div>
<div class="work-line good">YES — it's a cover! These four items can't all fit.</div>
</div>

<div class="explain">The group weighs more than the bag can hold. So we know: in any valid solution, you can never have x₁ = x₂ = x₄ = x₅ = 1 all at once.</div>

<div class="outcome yes">✓ Cover confirmed: total weight 21 > capacity 18. Now we need to check if it's minimal.</div>
`},

// ===== 3: IS IT MINIMAL =====
{title:"Is It Minimal?",html:`
<div class="chapter-num">Step 3 — Part 1b</div>
<h2>Is the Cover Minimal?</h2>
<div class="subtitle">A minimal cover means: every item in the group is necessary to make it too heavy. If you remove any single item, the rest should fit (≤ 18). We test every removal, one at a time.</div>

<div class="card blue">
<div class="card-title">What We're About to Do</div>
<div class="explain" style="margin:0">
Our cover has 4 items: {1, 2, 4, 5}. We need 4 checks.<br>
For each item, we remove it, add up the remaining 3, and check if they fit (≤ 18).<br><br>
<strong>If ALL four checks fit → it's minimal.</strong><br>
If even one check still exceeds 18 → not minimal (that item was unnecessary).
</div>
</div>

<div class="card">
<div class="card-title">Check 1 — Remove x₁ (weight 3)</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>
  <div class="check-math">Remaining: {2, 4, 5} → 4 + 8 + 6 = <strong>18</strong></div>
  <div class="check-result pass">18 ≤ 18 → fits</div>
</div>
<div class="explain">Without x₁, the group fits. So x₁ was necessary to make it overflow.</div>
</div>

<div class="card">
<div class="card-title">Check 2 — Remove x₂ (weight 4)</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>
  <div class="check-math">Remaining: {1, 4, 5} → 3 + 8 + 6 = <strong>17</strong></div>
  <div class="check-result pass">17 ≤ 18 → fits</div>
</div>
<div class="explain">Without x₂, fits. x₂ was necessary.</div>
</div>

<div class="card">
<div class="card-title">Check 3 — Remove x₄ (weight 8)</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>
  <div class="check-math">Remaining: {1, 2, 5} → 3 + 4 + 6 = <strong>13</strong></div>
  <div class="check-result pass">13 ≤ 18 → fits</div>
</div>
<div class="explain">Without x₄, fits. x₄ was necessary.</div>
</div>

<div class="card">
<div class="card-title">Check 4 — Remove x₅ (weight 6)</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>
  <div class="check-math">Remaining: {1, 2, 4} → 3 + 4 + 8 = <strong>15</strong></div>
  <div class="check-result pass">15 ≤ 18 → fits</div>
</div>
<div class="explain">Without x₅, fits. x₅ was necessary.</div>
</div>

<div class="card green">
<div class="card-title">Result</div>
<div class="explain" style="margin:0">
All four removals fit. Every single item was necessary to make the group exceed 18. No item is redundant.<br><br>
<strong>C = {1, 2, 4, 5} is a minimal cover.</strong> ✓
</div>
</div>

<div class="outcome yes">✓ Minimal cover confirmed. Every item is necessary. Now let's write the inequality.</div>
`},

// ===== 4: WRITE THE INEQUALITY =====
{title:"Write the Inequality",html:`
<div class="chapter-num">Step 4 — Part 1c</div>
<h2>Write the Cover Inequality</h2>
<div class="subtitle">Now we turn the minimal cover into a constraint. This is the easiest part — but the "why" behind it is important to understand.</div>

<div class="card blue">
<div class="card-title">The Logic</div>
<div class="explain" style="margin:0">
We proved that all 4 items {1, 2, 4, 5} together weigh 21, which is more than 18. So they <strong>can't all be in the bag at the same time</strong>.<br><br>
If all 4 can't fit → at least 1 must stay out → at most <strong>4 − 1 = 3</strong> can go in.<br><br>
That's where the number 3 comes from. It's always <strong>one less than the group size</strong>. Because if the whole group overflows, you need to leave at least one behind.
</div>
</div>

<div class="card amber">
<div class="card-title">Why 3 and Not 18?</div>
<div class="explain" style="margin:0">
The original constraint uses weights: 3x₁ + 4x₂ + 8x₄ + 6x₅ ≤ <strong>18</strong><br><br>
The cover constraint doesn't use weights at all: x₁ + x₂ + x₄ + x₅ ≤ <strong>3</strong><br><br>
These are completely different constraints. The original talks about <strong>how heavy</strong> things are. The cover constraint talks about <strong>how many</strong> things you can take. It's just counting — every x is either 0 or 1, so the left side is simply "how many items are in the bag."<br><br>
The 3 has nothing to do with the capacity 18. It comes purely from: <strong>group size (4) minus 1 = 3</strong>.
</div>
</div>

<div class="card">
<div class="card-title">The General Formula</div>
<div class="explain" style="margin:0">For any minimal cover with <strong>n</strong> items:</div>
<div class="work-line result" style="margin-top:6px">sum of x's in the cover ≤ n − 1</div>
<div class="explain" style="margin-top:8px">
Examples:<br>
• 3 items in the cover → ≤ <strong>2</strong><br>
• 4 items in the cover → ≤ <strong>3</strong><br>
• 5 items in the cover → ≤ <strong>4</strong><br>
• 7 items in the cover → ≤ <strong>6</strong><br><br>
Always one less. Because "all of them overflow" means "at most all-minus-one can fit."
</div>
</div>

<div class="card">
<div class="card-title">Apply It to Our Cover</div>
<div class="work-line">Cover = {1, 2, 4, 5} → 4 items</div>
<div class="work-line">n − 1 = 4 − 1 = 3</div>
</div>

<div class="card purple">
<div class="card-title">The Cover Inequality</div>
<div class="work-line purple" style="font-size:1rem">x₁ + x₂ + x₄ + x₅ ≤ 3</div>
<div class="explain" style="margin-top:8px">
<strong>No weights.</strong> Every x is just 1. The weights were only used to prove the cover. The inequality itself just counts: "at most 3 of these 4 items can be in the bag."<br><br>
Notice x₃ is missing — it wasn't in the cover. The cover constraint only involves the variables that are in the cover group.
</div>
</div>

<div class="card">
<div class="card-title">What About the Original Constraint?</div>
<div class="explain" style="margin:0">
The original constraint still exists:<br>
3x₁ + 4x₂ + 12x₃ + 8x₄ + 6x₅ ≤ 18<br><br>
The cover inequality is an <strong>extra</strong> constraint you add on top. Both live in the problem together:<br>
• Original: "total weight can't exceed 18"<br>
• Cover: "also, at most 3 of {1,2,4,5} can be in"<br><br>
Together they give the solver more information to work with.
</div>
</div>

<div class="outcome cut">✂ Cover inequality: x₁ + x₂ + x₄ + x₅ ≤ 3. Now let's strengthen it.</div>
`},

// ===== 5: STRENGTHEN =====
{title:"Strengthen the Inequality",html:`
<div class="chapter-num">Step 5 — Part 2</div>
<h2>Strengthening the Cover Inequality</h2>
<div class="subtitle">Can we make the constraint even tighter? Sometimes yes — by adding outside variables "for free."</div>

<div class="card blue">
<div class="card-title">The Idea</div>
<div class="explain" style="margin:0">
Look at variables that are <strong>NOT</strong> in the cover. If one of them is <strong>heavier than every item in the cover</strong>, it can join the left side of the inequality without changing the right side.<br><br>
Why? Because if this heavy item could replace any cover member and still make the group too heavy, then it's subject to the same restriction.
</div>
</div>

<div class="section-label" style="border-top:none;margin-top:0;padding-top:0">Who's Not in the Cover?</div>

<div class="explain">Our cover is {1, 2, 4, 5}. The only item NOT in the cover is <strong>x₃</strong> (weight 12).</div>

<div class="section-label">Is x₃ Heavier Than Every Item in the Cover?</div>

<div class="card">
<div class="card-title">Compare x₃ (weight 12) to Each Cover Member</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>
  <div class="check-math">12 > 3 (x₁'s weight)</div>
  <div class="check-result pass">Heavier</div>
</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>
  <div class="check-math">12 > 4 (x₂'s weight)</div>
  <div class="check-result pass">Heavier</div>
</div>
<div class="check-row">
  <div class="check-icon pass">✓</div>

<div class="chapter-num">Epilogue</div>
<h2>The Cover Constraints Recipe</h2>
<div class="subtitle">Everything in one place.</div>

<div class="card blue">
<div class="card-title">The Steps</div>
<div class="explain" style="margin:0">
<strong>1.</strong> You're given a group of items (the proposed cover).<br>
<strong>2.</strong> Add up their weights. Is the total > capacity? If yes → it's a cover.<br>
<strong>3.</strong> Remove each item one at a time. Does every removal make it fit (≤ capacity)? If yes → it's minimal.<br>
<strong>4.</strong> Write the inequality: sum of x's in the cover ≤ group size − 1.<br>
<strong>5.</strong> Look at items NOT in the cover. If one is heavier than ALL cover members → add it to the left side. Right side stays the same.
</div>
</div>

<div class="card">
<div class="card-title">Key Things to Remember</div>
<div class="explain" style="margin:0">
• Cover constraints are for <strong>binary (0-1)</strong> knapsack problems only<br>
• You only need <strong>weights and capacity</strong> — no profits, no ratios, no tableau<br>
• The cover inequality has <strong>no weights</strong> — every x is just 1, you're counting items<br>
• The right side is always <strong>group size − 1</strong> and never changes when strengthening<br>
• An outside variable can be added only if it's <strong>heavier than every</strong> item in the cover<br>
• On the exam: the cover group is <strong>given to you</strong>. You just prove and write.
</div>
</div>

  document.getElementById('stepLabel').textContent=`${cur+1} / ${chapters.length}`;

  let dots='';
  chapters.forEach((_,i)=>{dots+=`<div class="dot${i===cur?' active':''}" onclick="goTo(${i})"></div>`;});

  window.scrollTo({top:0,behavior:'smooth'});

function go(d){cur=Math.max(0,Math.min(chapters.length-1,cur+d));render();}
